services:
  # ─── Infraestrutura ───────────────────────────────────────────────────────
  
  postgres:
    image: postgres:16-alpine
    container_name: fiapx-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fiapx-network

  redis:
    image: redis:7-alpine
    container_name: fiapx-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fiapx-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fiapx-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fiapx-network

  # ─── Aplicações ───────────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: src/FiapX.API/Dockerfile
    container_name: fiapx-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${POSTGRES_CONNECTION_STRING}
      ConnectionStrings__Redis: ${REDIS_CONNECTION_STRING}
      JWT__Secret: ${JWT_SECRET}
      Telegram__Enabled: ${TELEGRAM_ENABLED}
      Telegram__BotToken: ${TELEGRAM_BOT_TOKEN}
      Telegram__ChatId: ${TELEGRAM_CHAT_ID}
      RabbitMQ__Host: ${RABBITMQ_HOST}
      RabbitMQ__Username: ${RABBITMQ_USERNAME}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      HealthChecks__PostgreSQL: ${POSTGRES_CONNECTION_STRING}
      HealthChecks__Redis: ${REDIS_CONNECTION_STRING}
      HealthChecks__RabbitMQ: ${RABBITMQ_CONNECTION_STRING}
    ports:
      - "8080:8080"
    volumes:
      - shared_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - fiapx-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: src/FiapX.Worker/Dockerfile
    container_name: fiapx-worker
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: ${POSTGRES_CONNECTION_STRING}
      ConnectionStrings__Redis: ${REDIS_CONNECTION_STRING}
      Telegram__Enabled: ${TELEGRAM_ENABLED}
      Telegram__BotToken: ${TELEGRAM_BOT_TOKEN}
      Telegram__ChatId: ${TELEGRAM_CHAT_ID}
      RabbitMQ__Host: ${RABBITMQ_HOST}
      RabbitMQ__Username: ${RABBITMQ_USERNAME}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
    ports:
      - "9091:9091"  # Porta para métricas Prometheus
    volumes:
      - shared_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - fiapx-network
    restart: unless-stopped

  # ─── Observabilidade ──────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: fiapx-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - fiapx-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.2
    container_name: fiapx-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - fiapx-network
    restart: unless-stopped

networks:
  fiapx-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  shared_storage:
  prometheus_data:
  grafana_data: