name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

env:
  DOTNET_VERSION: '8.0.x'
  AWS_REGION: us-east-1
  ECS_CLUSTER: fiapx-cluster
  ECS_SERVICE: fiapx-api
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
  SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}

jobs:
  build-and-test:
    name: Build, Testes e Cobertura
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout do código
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🔧 Setup .NET ${{ env.DOTNET_VERSION }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 🔍 Instalar SonarScanner
      run: |
        dotnet tool install --global dotnet-sonarscanner
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
    
    - name: 📦 Restaurar dependências
      run: dotnet restore TechChallenge-Fase5.slnx

    - name: 🔍 Iniciar análise Sonar
      run: |
        dotnet sonarscanner begin \
          /k:"${{ env.SONAR_PROJECT_KEY }}" \
          /o:"${{ env.SONAR_ORGANIZATION }}" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.token="${{ env.SONAR_TOKEN }}" \
          /d:sonar.cs.opencover.reportsPaths="**/coverage/coverage.opencover.xml"

    - name: 🏗️ Build do projeto
      run: dotnet build TechChallenge-Fase5.slnx --configuration Release --no-restore

    - name: 🧪 Executar testes com cobertura
      run: |
        dotnet test TechChallenge-Fase5.slnx \
          --configuration Release \
          --no-build \
          --verbosity normal \
          --logger "trx;LogFileName=test-results.trx" \
          /p:CollectCoverage=true \
          /p:CoverletOutputFormat=opencover \
          /p:CoverletOutput=./coverage/ \
          /p:Exclude="[*.Tests]*"

    - name: 🔍 Finalizar análise Sonar
      run: |
        dotnet sonarscanner end \
          /d:sonar.login="${{ env.SONAR_TOKEN }}"

    - name: 📊 Listar arquivos de cobertura gerados
      if: always()
      run: |
        echo "=== Procurando arquivos de cobertura ==="
        find . -name "coverage.opencover.xml" -type f
        echo "=== Fim da busca ==="
    
    - name: 📊 Resumo dos Testes
      if: always()
      run: |
        echo "═══════════════════════════════════════════════════════════"
        echo "📊 RESUMO DOS TESTES"
        echo "═══════════════════════════════════════════════════════════"
        
        RESULT_FILES=$(find . -name "test-results.trx" -type f)
        if [ -n "$RESULT_FILES" ]; then
          TOTAL_TESTS=$(grep -h "outcome=" $RESULT_FILES | wc -l || echo "0")
          PASSED_TESTS=$(grep -h 'outcome="Passed"' $RESULT_FILES | wc -l || echo "0")
          FAILED_TESTS=$(grep -h 'outcome="Failed"' $RESULT_FILES | wc -l || echo "0")
          
          echo "✅ Testes passando: $PASSED_TESTS"
          echo "❌ Testes falhando: $FAILED_TESTS"
          echo "📊 Total de testes: $TOTAL_TESTS"
        fi
        
        echo "═══════════════════════════════════════════════════════════"
    
    - name: 📈 Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: "**/coverage/coverage.opencover.xml"
        flags: unittests
        name: codecov-fiapx
        fail_ci_if_error: false
        verbose: true
    
    - name: 📊 Upload dos artefatos
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          **/test-results.trx
          **/coverage.opencover.xml
        retention-days: 30
    
    - name: ✅ Build e testes concluídos
      run: echo "✅ Build, testes e análise de cobertura concluídos!"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout do código
      uses: actions/checkout@v4
        
    - name: 🔐 Configurar credenciais AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: 🔐 Login no ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
    
    - name: 🐳 Setup Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: 🏗️ Build API Docker Image
      run: |
        echo "🔨 Buildando imagem da API..."
        docker build -f src/FiapX.API/Dockerfile -t fiapx-api:latest .
        echo "✅ API image criada!"
    
    - name: 🏗️ Build Worker Docker Image
      run: |
        echo "🔨 Buildando imagem do Worker..."
        docker build -f src/FiapX.Worker/Dockerfile -t fiapx-worker:latest .
        echo "✅ Worker image criada!"
    
    - name: 🏷️ Tag API image para ECR
      run: |
        docker tag fiapx-api:latest \
        ${{ steps.login-ecr.outputs.registry }}/fiapx-api:latest

    - name: 🏷️ Tag Worker image para ECR
      run: |
        docker tag fiapx-worker:latest \
        ${{ steps.login-ecr.outputs.registry }}/fiapx-worker:latest
        
    - name: 📤 Push API image
      run: |
        docker push \
        ${{ steps.login-ecr.outputs.registry }}/fiapx-api:latest

    - name: 📤 Push Worker image
      run: |
        docker push \
        ${{ steps.login-ecr.outputs.registry }}/fiapx-worker:latest

    - name: 🧪 Validar docker-compose
      run: |
        cat > .env << EOF
        TELEGRAM_ENABLED=false
        TELEGRAM_BOT_TOKEN=test-token
        TELEGRAM_CHAT_ID=12345
        POSTGRES_DB=fiapx_db
        POSTGRES_USER=fiapx_user
        POSTGRES_PASSWORD=fiapx_pass_2024
        RABBITMQ_DEFAULT_USER=fiapx
        RABBITMQ_DEFAULT_PASS=fiapx_rabbit_2024
        EOF
        docker compose config > /dev/null
        echo "✅ docker-compose.yml válido!"

  code-quality:
    name: Análise de Qualidade
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: 📥 Checkout do código
      uses: actions/checkout@v4
    
    - name: 🔧 Setup .NET ${{ env.DOTNET_VERSION }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: 📊 Estatísticas
      run: |
        echo "═══════════════════════════════════════════════════════════"
        echo "📊 ESTATÍSTICAS DO CÓDIGO"
        echo "═══════════════════════════════════════════════════════════"
        echo "📝 Código: $(find src -name "*.cs" -exec wc -l {} + | tail -1 | awk '{print $1}') linhas"
        echo "🧪 Testes: $(find tests -name "*.cs" -exec wc -l {} + | tail -1 | awk '{print $1}') linhas"
        echo "📁 Arquivos .cs: $(find . -name "*.cs" | wc -l)"
        echo "═══════════════════════════════════════════════════════════"

  deploy:
    name: Deploy ECS
    runs-on: ubuntu-latest
    needs: docker-build

    steps:

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Forçar novo deploy ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment

  summary:
    name: Resumo
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build, code-quality, deploy]
    if: always()
    
    steps:
    - name: 📊 Status
      run: |
        echo "═══════════════════════════════════════════════════════════"
        echo "🎯 PIPELINE CONCLUÍDO"
        echo "═══════════════════════════════════════════════════════════"
        echo "✅ Build/Testes: ${{ needs.build-and-test.result }}"
        echo "🐳 Docker: ${{ needs.docker-build.result }}"
        echo "📊 Quality: ${{ needs.code-quality.result }}"
        echo "📊 Deploy: ${{ needs.deploy.result }}"
        echo "═══════════════════════════════════════════════════════════"
        
        if [ "${{ needs.build-and-test.result }}" == "success" ]; then
          echo "🔗 https://app.codecov.io/github/wesleygyn/TechChallenge-fase-5-FIAP"
        fi
