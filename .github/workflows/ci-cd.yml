name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1: BUILD, TEST & COVERAGE
  # ═══════════════════════════════════════════════════════════════════════════
  build-and-test:
    name: Build, Testes e Cobertura
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout do código
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Necessário para Codecov
    
    - name: 🔧 Setup .NET ${{ env.DOTNET_VERSION }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: 📦 Restaurar dependências
      run: dotnet restore TechChallenge-Fase5.slnx
    
    - name: 🏗️ Build do projeto (Release)
      run: dotnet build TechChallenge-Fase5.slnx --configuration Release --no-restore
    
    - name: 🧪 Executar testes com cobertura
      run: |
        dotnet test TechChallenge-Fase5.slnx \
          --configuration Release \
          --no-build \
          --verbosity normal \
          --logger "trx;LogFileName=test-results.trx" \
          /p:CollectCoverage=true \
          /p:CoverletOutputFormat=opencover \
          /p:CoverletOutput=./coverage/ \
          /p:Exclude="[*.Tests]*" \
          || true
    
    - name: 📊 Publicar resultados dos testes
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Test Results
        path: '**/test-results.trx'
        reporter: dotnet-trx
        fail-on-error: false
    
    - name: 📈 Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./tests/**/coverage.opencover.xml
        flags: unittests
        name: codecov-fiapx
        fail_ci_if_error: false
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    
    - name: 📊 Upload dos resultados dos testes
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          **/test-results.trx
          **/coverage.opencover.xml
    
    - name: 📋 Resumo dos Testes
      if: always()
      run: |
        echo "═══════════════════════════════════════════════════════════"
        echo "📊 RESUMO DOS TESTES"
        echo "═══════════════════════════════════════════════════════════"
        
        # Contar testes
        TOTAL_TESTS=$(find . -name "test-results.trx" -exec grep -o "outcome=" {} \; | wc -l || echo "0")
        PASSED_TESTS=$(find . -name "test-results.trx" -exec grep -o 'outcome="Passed"' {} \; | wc -l || echo "0")
        FAILED_TESTS=$(find . -name "test-results.trx" -exec grep -o 'outcome="Failed"' {} \; | wc -l || echo "0")
        
        echo "✅ Testes passando: $PASSED_TESTS"
        echo "❌ Testes falhando: $FAILED_TESTS"
        echo "📊 Total de testes: $TOTAL_TESTS"
        echo "═══════════════════════════════════════════════════════════"
        
        # Verificar cobertura
        if [ -f "tests/**/coverage.opencover.xml" ]; then
          echo "📈 Relatório de cobertura gerado!"
          echo "🔗 Acesse o Codecov para ver detalhes"
        fi
    
    - name: ✅ Build e testes concluídos
      run: echo "Build, testes e análise de cobertura concluídos!"

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2: DOCKER BUILD (só roda se o build passar)
  # ═══════════════════════════════════════════════════════════════════════════
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout do código
      uses: actions/checkout@v4
    
    - name: 🐳 Setup Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: 🏗️ Build API Docker Image
      run: |
        echo "🔨 Buildando imagem da API..."
        docker build -f src/FiapX.API/Dockerfile -t fiapx-api:latest .
        echo "✅ API image criada com sucesso!"
    
    - name: 🏗️ Build Worker Docker Image
      run: |
        echo "🔨 Buildando imagem do Worker..."
        docker build -f src/FiapX.Worker/Dockerfile -t fiapx-worker:latest .
        echo "✅ Worker image criada com sucesso!"
    
    - name: 🧪 Validar docker-compose
      run: |
        echo "Criando .env temporário para validação..."
        cat > .env << EOF
        TELEGRAM_ENABLED=false
        TELEGRAM_BOT_TOKEN=test-token
        TELEGRAM_CHAT_ID=12345
        POSTGRES_DB=fiapx_db
        POSTGRES_USER=fiapx_user
        POSTGRES_PASSWORD=fiapx_pass_2024
        RABBITMQ_DEFAULT_USER=fiapx
        RABBITMQ_DEFAULT_PASS=fiapx_rabbit_2024
        EOF
        
        echo "Validando docker-compose.yml..."
        docker compose config > /dev/null
        echo "✅ docker-compose.yml válido!"
    
    - name: 📊 Resumo
      run: |
        echo "═══════════════════════════════════════════════════════════"
        echo "✅ DOCKER BUILD CONCLUÍDO COM SUCESSO!"
        echo "═══════════════════════════════════════════════════════════"
        echo "📦 Imagens criadas:"
        echo "   - fiapx-api:latest"
        echo "   - fiapx-worker:latest"
        echo "═══════════════════════════════════════════════════════════"

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3: CODE QUALITY (análise de código)
  # ═══════════════════════════════════════════════════════════════════════════
  code-quality:
    name: Análise de Qualidade
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: 📥 Checkout do código
      uses: actions/checkout@v4
    
    - name: 🔧 Setup .NET ${{ env.DOTNET_VERSION }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: 📊 Análise de warnings
      run: |
        echo "Analisando warnings do compilador..."
        dotnet build TechChallenge-Fase5.slnx --configuration Release /p:TreatWarningsAsErrors=false > build-output.txt 2>&1 || true
        
        # Contar warnings
        WARNING_COUNT=$(grep -c "warning" build-output.txt || echo "0")
        echo "⚠️ Total de warnings encontrados: $WARNING_COUNT"
        
        if [ $WARNING_COUNT -gt 0 ]; then
          echo "Exibindo warnings:"
          grep "warning" build-output.txt || true
        else
          echo "✅ Nenhum warning encontrado!"
        fi
    
    - name: 📏 Estatísticas do Código
      run: |
        echo "═══════════════════════════════════════════════════════════"
        echo "📊 ESTATÍSTICAS DO CÓDIGO"
        echo "═══════════════════════════════════════════════════════════"
        
        # Contar linhas de código
        echo "📝 Linhas de código (src/):"
        find src -name "*.cs" | xargs wc -l | tail -1
        
        echo ""
        echo "🧪 Linhas de teste (tests/):"
        find tests -name "*.cs" | xargs wc -l | tail -1
        
        echo ""
        echo "📁 Total de arquivos .cs:"
        find . -name "*.cs" | wc -l
        
        echo "═══════════════════════════════════════════════════════════"
    
    - name: ✅ Análise concluída
      run: echo "Análise de qualidade concluída!"

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 4: STATUS SUMMARY (resumo final)
  # ═══════════════════════════════════════════════════════════════════════════
  summary:
    name: Resumo Final
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build, code-quality]
    if: always()
    
    steps:
    - name: 📊 Status do Pipeline
      run: |
        echo "═══════════════════════════════════════════════════════════"
        echo "🎯 PIPELINE CONCLUÍDO"
        echo "═══════════════════════════════════════════════════════════"
        echo "✅ Build e Testes: ${{ needs.build-and-test.result }}"
        echo "✅ Docker Build: ${{ needs.docker-build.result }}"
        echo "✅ Code Quality: ${{ needs.code-quality.result }}"
        echo "═══════════════════════════════════════════════════════════"
        echo ""
        echo "📈 Próximos passos:"
        echo "  1. Verificar cobertura no Codecov"
        echo "  2. Revisar warnings (se houver)"
        echo "  3. Deploy (se necessário)"
        echo "═══════════════════════════════════════════════════════════"
