name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1: BUILD, TEST & COVERAGE
  # ═══════════════════════════════════════════════════════════════════════════
  build-and-test:
    name: Build, Testes e Cobertura
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout do código
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🔧 Setup .NET ${{ env.DOTNET_VERSION }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: 📦 Restaurar dependências
      run: dotnet restore TechChallenge-Fase5.slnx
    
    - name: 🏗️ Build do projeto (Release)
      run: dotnet build TechChallenge-Fase5.slnx --configuration Release --no-restore
    
    - name: 🧪 Executar testes com cobertura
      run: |
        dotnet test TechChallenge-Fase5.slnx \
          --configuration Release \
          --no-build \
          --verbosity normal \
          --logger "trx;LogFileName=test-results.trx" \
          /p:CollectCoverage=true \
          /p:CoverletOutputFormat=opencover \
          /p:CoverletOutput=./coverage/ \
          /p:Exclude="[*.Tests]*"
    
    - name: 📊 Resumo dos Testes
      if: always()
      run: |
        echo "═══════════════════════════════════════════════════════════"
        echo "📊 RESUMO DOS TESTES"
        echo "═══════════════════════════════════════════════════════════"
        
        RESULT_FILES=$(find . -name "test-results.trx" -type f)
        if [ -n "$RESULT_FILES" ]; then
          TOTAL_TESTS=$(grep -h "outcome=" $RESULT_FILES | wc -l || echo "0")
          PASSED_TESTS=$(grep -h 'outcome="Passed"' $RESULT_FILES | wc -l || echo "0")
          FAILED_TESTS=$(grep -h 'outcome="Failed"' $RESULT_FILES | wc -l || echo "0")
          
          echo "✅ Testes passando: $PASSED_TESTS"
          echo "❌ Testes falhando: $FAILED_TESTS"
          echo "📊 Total de testes: $TOTAL_TESTS"
        else
          echo "⚠️ Nenhum arquivo de resultado encontrado"
        fi
        
        echo "═══════════════════════════════════════════════════════════"
    
    - name: 📈 Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./tests/**/coverage.opencover.xml
        flags: unittests
        name: codecov-fiapx
        fail_ci_if_error: false
        verbose: true
    
    - name: 📊 Upload dos artefatos
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          **/test-results.trx
          **/coverage.opencover.xml
        retention-days: 30
    
    - name: ✅ Build e testes concluídos
      run: echo "✅ Build, testes e análise de cobertura concluídos!"

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2: DOCKER BUILD
  # ═══════════════════════════════════════════════════════════════════════════
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout do código
      uses: actions/checkout@v4
    
    - name: 🐳 Setup Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: 🏗️ Build API Docker Image
      run: |
        echo "🔨 Buildando imagem da API..."
        docker build -f src/FiapX.API/Dockerfile -t fiapx-api:latest .
        echo "✅ API image criada com sucesso!"
    
    - name: 🏗️ Build Worker Docker Image
      run: |
        echo "🔨 Buildando imagem do Worker..."
        docker build -f src/FiapX.Worker/Dockerfile -t fiapx-worker:latest .
        echo "✅ Worker image criada com sucesso!"
    
    - name: 🧪 Validar docker-compose
      run: |
        echo "Criando .env temporário para validação..."
        cat > .env << EOF
        TELEGRAM_ENABLED=false
        TELEGRAM_BOT_TOKEN=test-token
        TELEGRAM_CHAT_ID=12345
        POSTGRES_DB=fiapx_db
        POSTGRES_USER=fiapx_user
        POSTGRES_PASSWORD=fiapx_pass_2024
        RABBITMQ_DEFAULT_USER=fiapx
        RABBITMQ_DEFAULT_PASS=fiapx_rabbit_2024
        EOF
        
        echo "Validando docker-compose.yml..."
        docker compose config > /dev/null
        echo "✅ docker-compose.yml válido!"
    
    - name: 📊 Resumo Docker
      run: |
        echo "═══════════════════════════════════════════════════════════"
        echo "✅ DOCKER BUILD CONCLUÍDO!"
        echo "═══════════════════════════════════════════════════════════"
        echo "📦 Imagens criadas:"
        echo "   - fiapx-api:latest"
        echo "   - fiapx-worker:latest"
        echo "═══════════════════════════════════════════════════════════"

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3: CODE QUALITY
  # ═══════════════════════════════════════════════════════════════════════════
  code-quality:
    name: Análise de Qualidade
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: 📥 Checkout do código
      uses: actions/checkout@v4
    
    - name: 🔧 Setup .NET ${{ env.DOTNET_VERSION }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: 📊 Análise de warnings
      run: |
        echo "Analisando warnings..."
        dotnet build TechChallenge-Fase5.slnx --configuration Release /p:TreatWarningsAsErrors=false > build-output.txt 2>&1 || true
        
        WARNING_COUNT=$(grep -c "warning" build-output.txt || echo "0")
        echo "⚠️ Warnings: $WARNING_COUNT"
        
        if [ $WARNING_COUNT -gt 0 ]; then
          grep "warning" build-output.txt | head -20 || true
        else
          echo "✅ Sem warnings!"
        fi
    
    - name: 📏 Estatísticas
      run: |
        echo "═══════════════════════════════════════════════════════════"
        echo "📊 ESTATÍSTICAS DO CÓDIGO"
        echo "═══════════════════════════════════════════════════════════"
        echo "📝 Código: $(find src -name "*.cs" -exec wc -l {} + | tail -1 | awk '{print $1}') linhas"
        echo "🧪 Testes: $(find tests -name "*.cs" -exec wc -l {} + | tail -1 | awk '{print $1}') linhas"
        echo "📁 Arquivos .cs: $(find . -name "*.cs" | wc -l)"
        echo "📦 Projetos: $(find . -name "*.csproj" | wc -l)"
        echo "═══════════════════════════════════════════════════════════"

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 4: SUMMARY
  # ═══════════════════════════════════════════════════════════════════════════
  summary:
    name: Resumo
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build, code-quality]
    if: always()
    
    steps:
    - name: 📊 Status do Pipeline
      run: |
        echo "═══════════════════════════════════════════════════════════"
        echo "🎯 PIPELINE CONCLUÍDO"
        echo "═══════════════════════════════════════════════════════════"
        echo "✅ Build/Testes: ${{ needs.build-and-test.result }}"
        echo "🐳 Docker Build: ${{ needs.docker-build.result }}"
        echo "📊 Code Quality: ${{ needs.code-quality.result }}"
        echo "═══════════════════════════════════════════════════════════"
        
        if [ "${{ needs.build-and-test.result }}" == "success" ]; then
          echo "✅ Todos os testes passaram!"
          echo "📈 Verifique a cobertura no Codecov"
          echo "🔗 https://app.codecov.io/github/wesleygyn/TechChallenge-fase-5-FIAP"
        fi